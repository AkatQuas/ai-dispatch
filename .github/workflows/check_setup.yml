name: ✅ Check Setup

on:
  workflow_dispatch: # 只能手动触发，用于首次验证配置

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run setup check
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_SECRET: ${{ secrets.LARK_SECRET }}
          LARK_RECEIVER: ${{ secrets.LARK_RECEIVER }}
          LARK_FOLDER_TOKEN: ${{ secrets.LARK_FOLDER_TOKEN }}
        run: uv run python check_setup.py
