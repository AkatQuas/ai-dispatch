name: ⚙️ Setup

on:
  workflow_dispatch:
    inputs:
      send_hour_utc:
        description: 'Send time — UTC hour 0-23  (Beijing 08:00 → 0 | London BST 07:00 → 6 | New York 07:00 → 11)'
        required: true
        default: '6'
        type: string
      output_language:
        description: 'Digest output language'
        required: true
        default: English
        type: choice
        options:
          - English
          - 中文
      model:
        description: 'DeepSeek model (e.g. deepseek-v4-flash, deepseek-v4-pro)'
        required: true
        default: deepseek-v4-flash
        type: string

jobs:
  setup:
    name: Apply configuration
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Update config.yml
        run: |
          python3 - <<'EOF'
          import re, sys

          hour      = "${{ inputs.send_hour_utc }}".strip()
          language  = "${{ inputs.output_language }}"
          model     = "${{ inputs.model }}".strip()

          try:
              hour_int = int(hour)
              assert 0 <= hour_int <= 23
          except (ValueError, AssertionError):
              print(f"ERROR: send_hour_utc must be 0-23, got '{hour}'")
              sys.exit(1)

          if not model:
              print("ERROR: model must not be empty")
              sys.exit(1)

          with open("config.yml", encoding="utf-8") as f:
              content = f.read()

          content = re.sub(r"^send_hour_utc:\s*\d+",  f"send_hour_utc: {hour_int}", content, flags=re.MULTILINE)
          content = re.sub(r"^(\s+model:\s*)\S+",     rf"\g<1>{model}",          content, flags=re.MULTILINE)
          content = re.sub(r"^(\s+output_language:\s*)\S+", rf"\g<1>{language}", content, flags=re.MULTILINE)

          with open("config.yml", "w", encoding="utf-8") as f:
              f.write(content)

          print(f"✓ model={model}  send_hour_utc={hour_int}  language={language}")
          EOF

      - name: Commit and push
        run: |
          git config user.name  "AI Dispatch Setup"
          git config user.email "setup@ai-dispatch.bot"
          git add config.yml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: apply setup wizard config"
          git push

      - name: Print secrets checklist
        run: |
          SECRETS_URL="https://github.com/${{ github.repository }}/settings/secrets/actions/new"

          echo ""
          echo "════════════════════════════════════════════════════"
          echo "   config.yml updated and pushed"
          echo ""
          echo "  Next: add these 5 secrets in your repo"
          echo "  $SECRETS_URL"
          echo ""
          echo "  Secret name            Value"
          echo "  ─────────────────────────────────────────────────"
          echo "  DEEPSEEK_API_KEY"
          echo "    → https://platform.deepseek.com/api_keys"
          echo ""
          echo "  LARK_APP_ID"
          echo "    → Feishu app ID from https://open.feishu.cn/app"
          echo ""
          echo "  LARK_SECRET"
          echo "    → Feishu app secret"
          echo ""
          echo "  LARK_FOLDER_TOKEN"
          echo "    → Feishu folder token for cloud docs (see docs/lark-doc.md)"
          echo ""
          echo "  LARK_RECEIVER"
          echo "    → Recipient union_id (im:message permission required)"
          echo ""
          echo "  After adding secrets, run:"
          echo "  Actions → Check Setup → Run workflow"
          echo "════════════════════════════════════════════════════"
