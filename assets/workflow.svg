<svg width="960" height="288" viewBox="0 0 960 288" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif">
  <defs>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-indigo" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arr-dashed" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="288" fill="#ffffff"/>

  <!-- ── SECTION 1: One-time Setup ─────────────────────────────── -->
  <rect x="16" y="12" width="292" height="224" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="162" y="40" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="0.08em">ONE-TIME SETUP</text>

  <!-- Fork box -->
  <rect x="32" y="54" width="116" height="52" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="90" y="76" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="700">Fork</text>
  <text x="90" y="92" text-anchor="middle" fill="#64748b" font-size="10">on GitHub</text>

  <!-- arrow -->
  <line x1="150" y1="80" x2="168" y2="80" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Setup wizard box -->
  <rect x="172" y="54" width="120" height="52" rx="8" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="232" y="76" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">python3 setup.py</text>
  <text x="232" y="92" text-anchor="middle" fill="#c7d2fe" font-size="10">2 min · guided</text>

  <!-- down arrow -->
  <line x1="232" y1="108" x2="232" y2="138" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Secrets + config box -->
  <rect x="32" y="142" width="260" height="72" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="36" y="162" fill="#22c55e" font-size="11">✓</text>
  <text x="50" y="162" fill="#475569" font-size="10">GitHub Secrets written automatically</text>
  <text x="36" y="180" fill="#22c55e" font-size="11">✓</text>
  <text x="50" y="180" fill="#475569" font-size="10">config.yml updated &amp; pushed</text>
  <text x="36" y="198" fill="#22c55e" font-size="11">✓</text>
  <text x="50" y="198" fill="#475569" font-size="10">Ready — no code editing needed</text>

  <!-- ── BIG ARROW between sections ───────────────────────── -->
  <line x1="316" y1="124" x2="352" y2="124" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arr-indigo)"/>
  <text x="334" y="118" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="700">THEN</text>

  <!-- ── SECTION 2: Every Morning ──────────────────────────────── -->
  <rect x="356" y="12" width="588" height="254" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="650" y="34" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="0.08em">EVERY MORNING · FULLY AUTOMATIC</text>

  <!-- Report history box -->
  <rect x="488" y="44" width="116" height="40" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="546" y="62" text-anchor="middle" fill="#6d28d9" font-size="10" font-weight="700">Report History</text>
  <text x="546" y="76" text-anchor="middle" fill="#7c3aed" font-size="9">report/ · last 3 digests</text>

  <!-- dashed arrow: history → LLM -->
  <line x1="546" y1="84" x2="546" y2="96" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-dashed)"/>

  <!-- RSS box -->
  <rect x="372" y="58" width="96" height="72" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="420" y="80" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="700">RSS Feeds</text>
  <text x="420" y="97" text-anchor="middle" fill="#64748b" font-size="10">20+ sources</text>
  <text x="420" y="113" text-anchor="middle" fill="#64748b" font-size="10">news · blogs</text>

  <!-- arrow: RSS → LLM -->
  <line x1="470" y1="94" x2="488" y2="94" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- LLM box -->
  <rect x="492" y="98" width="112" height="72" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="548" y="120" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="700">LLM Analysis</text>
  <text x="548" y="137" text-anchor="middle" fill="#64748b" font-size="10">DeepSeek API</text>
  <text x="548" y="153" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">dedupe vs history</text>

  <!-- arrow: LLM → Digest -->
  <line x1="606" y1="134" x2="624" y2="134" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Digest box -->
  <rect x="628" y="98" width="96" height="72" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="676" y="120" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="700">Daily Digest</text>
  <text x="676" y="137" text-anchor="middle" fill="#64748b" font-size="10">5 sections</text>
  <text x="676" y="153" text-anchor="middle" fill="#64748b" font-size="10">Markdown</text>

  <!-- arrow: Digest → Lark Doc -->
  <line x1="726" y1="134" x2="744" y2="134" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Lark Doc box -->
  <rect x="748" y="98" width="88" height="72" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="792" y="120" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="700">Lark Doc</text>
  <text x="792" y="137" text-anchor="middle" fill="#64748b" font-size="10">Cloud docx</text>
  <text x="792" y="153" text-anchor="middle" fill="#64748b" font-size="10">Bot link</text>

  <!-- arrow: Lark Doc → inbox -->
  <line x1="838" y1="134" x2="856" y2="134" stroke="#6366f1" stroke-width="2" marker-end="url(#arr-indigo)"/>

  <!-- Lark inbox box -->
  <rect x="860" y="98" width="72" height="72" rx="8" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="896" y="124" text-anchor="middle" font-size="22">📄</text>
  <text x="896" y="146" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">BOT LINK</text>
  <text x="896" y="158" text-anchor="middle" fill="#c7d2fe" font-size="9">→ YOUR LARK</text>

  <!-- arrow: Digest → persist -->
  <line x1="676" y1="172" x2="676" y2="184" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Persist box -->
  <rect x="560" y="186" width="232" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="676" y="204" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="700">Persist to repo</text>
  <text x="676" y="218" text-anchor="middle" fill="#64748b" font-size="9">report/YYYY-MM-DD.md · sent_history.json</text>

  <!-- What you get bullets -->
  <text x="372" y="226" fill="#1e293b" font-size="10" font-weight="700">What's inside:</text>
  <text x="372" y="242" fill="#64748b" font-size="10">📌 Top Stories · 📈 Trends · 🔬 Papers · 📖 Blog Pick · 💡 Today's Signal</text>
  <text x="372" y="258" fill="#94a3b8" font-size="10">History-aware · No repeat news · GitHub Actions free</text>

  <!-- Footer -->
  <text x="440" y="280" text-anchor="middle" fill="#cbd5e1" font-size="9.5">📡 AI Dispatch · github.com/AkatQuas/ai-dispatch</text>
</svg>
